services:
  - type: web
    name: cinematch-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: cinematch-db
          property: connectionString
      - key: TMDB_API_KEY
        sync: false # Set this in Render Dashboard manually
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: cinematch-db
    plan: free
